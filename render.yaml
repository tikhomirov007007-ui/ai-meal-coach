services:
  - type: web
    name: ai-meal-coach
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-meal-coach-db
          property: connectionString
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: MINI_APP_URL
        sync: false

databases:
  - name: ai-meal-coach-db
    plan: free
